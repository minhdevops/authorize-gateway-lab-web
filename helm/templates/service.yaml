apiVersion: v1
kind: Service

metadata:
  name: {{ include "authorize-gateway-lab-web.fullname" . }}
  labels:
    {{- include "authorize-gateway-lab-web.labels" . | nindent 4 }}

spec:
  type: {{ .Values.service.type }}

  selector:
    {{- include "authorize-gateway-lab-web.selectorLabels" . | nindent 4 }}

  ports:
    - name: http
      protocol: TCP

      port: {{ .Values.service.port }}

      targetPort: http

      {{- if and
            (eq .Values.service.type "NodePort")
            .Values.service.nodePort
      }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}